
<h2 class="sr-only">Moat Scorecard: score a company across five competitive advantage dimensions and get an overall moat rating.</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--orange:#E8673A;--orange-faint:rgba(232,103,58,0.12)}
body{font-family:var(--font-mono,monospace);color:var(--color-text-primary);background:transparent}
.wrap{padding:0 0 2rem}
.hdr{display:flex;align-items:baseline;gap:8px;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.brand{font-size:12px;font-weight:500;letter-spacing:.08em;color:var(--color-text-secondary)}
.brand span{color:var(--orange)}
.ttl{font-size:20px;font-weight:500}
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden}
.tab{flex:1;padding:8px 0;font-size:11px;font-weight:500;text-align:center;cursor:pointer;background:transparent;border:none;color:var(--color-text-secondary);letter-spacing:.05em}
.tab.active{background:var(--orange);color:#fff}
input[type=text],input[type=number],select,textarea{width:100%;font-size:13px;padding:7px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-mono,monospace)}
.btn{padding:9px 16px;border-radius:var(--border-radius-md);font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-primary);letter-spacing:.04em}
.btn.primary{background:var(--orange);border-color:var(--orange);color:#fff;width:100%}
.btn.ghost{flex:1}

.company-bar{display:flex;gap:8px;margin-bottom:1.5rem}
.company-bar input{flex:1}

.dimension{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem;margin-bottom:10px}
.dim-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.dim-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.dim-score{font-size:20px;font-weight:500;color:var(--orange)}
.dim-icon{font-size:18px;margin-right:6px}
.dim-desc{font-size:11px;color:var(--color-text-secondary);margin-bottom:12px;line-height:1.6}
.questions{}
.q-row{margin-bottom:10px}
.q-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:6px;line-height:1.5}
.slider-row{display:flex;align-items:center;gap:10px}
input[type=range]{flex:1;accent-color:var(--orange)}
.slider-val{font-size:12px;font-weight:500;min-width:20px;text-align:right;color:var(--color-text-primary)}
.rubric{font-size:10px;color:var(--color-text-secondary);display:flex;justify-content:space-between;margin-top:2px;padding:0 2px}

.verdict-box{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem;background:var(--color-background-secondary)}
.verdict-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem}
.verdict-company{font-size:16px;font-weight:500}
.verdict-date{font-size:10px;color:var(--color-text-secondary);margin-top:4px}
.moat-badge{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;letter-spacing:.05em}
.moat-wide{background:rgba(63,185,80,.15);color:#3fb950;border:0.5px solid rgba(63,185,80,.3)}
.moat-narrow{background:var(--orange-faint);color:var(--orange);border:0.5px solid rgba(232,103,58,.3)}
.moat-none{background:rgba(248,81,73,.12);color:#f85149;border:0.5px solid rgba(248,81,73,.3)}

.score-ring-wrap{display:flex;flex-direction:column;align-items:center;margin:1rem 0}
.score-ring{position:relative;width:110px;height:110px}
.score-ring svg{width:110px;height:110px;transform:rotate(-90deg)}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-big{font-size:28px;font-weight:500;color:var(--color-text-primary)}
.score-max{font-size:11px;color:var(--color-text-secondary)}

.dim-bars{margin:1rem 0}
.dbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dbar-lbl{font-size:11px;color:var(--color-text-secondary);width:90px;flex-shrink:0}
.dbar-track{flex:1;height:6px;background:var(--color-background-primary);border-radius:3px;overflow:hidden}
.dbar-fill{height:100%;border-radius:3px;background:var(--orange);transition:width .4s}
.dbar-val{font-size:11px;font-weight:500;width:26px;text-align:right;flex-shrink:0}

.strengths{margin-top:1rem}
.str-title{font-size:11px;letter-spacing:.06em;color:var(--color-text-secondary);margin-bottom:.5rem}
.str-item{display:flex;align-items:flex-start;gap:6px;margin-bottom:6px;font-size:12px;color:var(--color-text-primary);line-height:1.5}
.str-bullet{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}

.saved-list{margin-top:0}
.saved-card{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem;margin-bottom:10px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);transition:border-color .15s}
.saved-card:hover{border-color:var(--orange)}
.sc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sc-name{font-size:14px;font-weight:500}
.sc-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:500}
.sc-bars{display:flex;gap:4px;align-items:flex-end;height:28px}
.sc-bar{width:14px;border-radius:2px 2px 0 0;background:var(--orange);opacity:.6}
.sc-meta{font-size:10px;color:var(--color-text-secondary);margin-top:4px}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--color-text-secondary);font-size:12px}
</style>

<div class="wrap">
<div class="hdr">
  <span class="brand">[ ASK<span>AKSHAY</span> ]</span>
  <span class="ttl">Moat scorecard</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('score')">SCORE</button>
  <button class="tab" onclick="switchTab('result')">VERDICT</button>
  <button class="tab" onclick="switchTab('saved')">SAVED</button>
</div>

<div id="tab-score">
  <div class="company-bar">
    <input type="text" id="companyName" placeholder="Company name (e.g. Nestle Malaysia)" />
    <button class="btn ghost" onclick="switchTab('result')">Score ↗</button>
  </div>
  <div id="dimensions"></div>
</div>

<div id="tab-result" style="display:none">
  <div class="verdict-box" id="verdictBox"></div>
  <div style="display:flex;gap:8px">
    <button class="btn ghost" style="flex:1" onclick="saveCard()">Save scorecard</button>
    <button class="btn ghost" style="flex:1" onclick="sendPrompt('Explain the moat of ' + (document.getElementById('companyName').value||'this company') + ' in depth based on these scores: ' + getSummary())">Deep dive ↗</button>
  </div>
</div>

<div id="tab-saved" style="display:none">
  <div id="savedList"></div>
  <button class="btn" style="width:100%;margin-top:.5rem" onclick="clearSaved()">Clear all saved</button>
</div>
</div>

<script>
const DIMS = [
  {
    id:'network',
    icon:'◈',
    name:'Network effects',
    desc:'Does the product become more valuable as more users join? Stronger when each new user adds direct value to all others.',
    questions:[
      {q:'Each additional user makes the product meaningfully better for existing users.',rubric:['No effect','Slight','Moderate','Strong','Essential']},
      {q:'Competitors would need to replicate the entire user base, not just the product.',rubric:['Easy to copy','Modest barrier','Hard','Very hard','Impossible without users']},
      {q:'Users actively bring in other users (virality, referrals, ecosystems).',rubric:['Rare','Occasional','Common','Frequent','Core growth engine']}
    ]
  },
  {
    id:'switching',
    icon:'⇄',
    name:'Switching costs',
    desc:'How painful is it for a customer to leave? High switching costs create captive revenue even without continuous product superiority.',
    questions:[
      {q:'Customers would incur significant financial or time cost to switch to a rival.',rubric:['Trivial','Low','Moderate','High','Prohibitive']},
      {q:'Deep integration into customer workflows, data, or contracts lock them in.',rubric:['No integration','Surface','Medium','Deep','Mission-critical']},
      {q:'Churn rate is structurally low — customers renew without active selling.',rubric:['High churn','Moderate','Low','Very low','Near-zero churn']}
    ]
  },
  {
    id:'cost',
    icon:'↓',
    name:'Cost advantage',
    desc:'Can this company produce at materially lower cost than rivals? Driven by scale, location, unique resources, or process innovation.',
    questions:[
      {q:'The company has lower unit costs than competitors at comparable quality.',rubric:['Higher costs','Slight edge','Moderate','Significant','Industry-lowest']},
      {q:'Cost advantage is structural (scale, geography, IP) not just operational efficiency.',rubric:['Operational only','Partly structural','Mostly structural','Structural','Deeply structural']},
      {q:'Competitors cannot easily replicate the cost structure.',rubric:['Easily copied','Some barriers','Hard to copy','Very hard','Impossible']},
    ]
  },
  {
    id:'intangible',
    icon:'◎',
    name:'Intangible assets',
    desc:'Brands, patents, licences, or regulatory approvals that competitors cannot easily acquire. Pricing power often traces here.',
    questions:[
      {q:'The brand commands a price premium or creates genuine customer preference.',rubric:['No premium','Marginal','Moderate','Significant','Exceptional']},
      {q:'Patents, trade secrets, or proprietary tech provide durable protection.',rubric:['None','Weak/short','Moderate','Strong','Fortress IP']},
      {q:'Licences, permits, or regulatory status create meaningful barriers to entry.',rubric:['None','Minimal','Some','Significant','Near-monopoly licence']}
    ]
  },
  {
    id:'scale',
    icon:'⬡',
    name:'Efficient scale',
    desc:'Does the market size limit competition? When a niche is served by one player at capacity, new entrants would earn sub-normal returns.',
    questions:[
      {q:'The market is sized such that a second entrant would make the economics unattractive for both.',rubric:['Large market','Slightly limited','Moderately limited','Quite limited','Natural monopoly niche']},
      {q:'The company has reached minimum efficient scale, lowering per-unit costs.',rubric:['Below scale','Approaching','At scale','Well past scale','Dominant scale']},
      {q:'Geographic or regulatory factors further constrain additional supply.',rubric:['No constraints','Slight','Moderate','High','Absolute cap']}
    ]
  }
];

const scores = {};
DIMS.forEach(d => { scores[d.id] = d.questions.map(()=>2); });

function buildDimensions(){
  const wrap = document.getElementById('dimensions');
  wrap.innerHTML = DIMS.map((d,di) => `
    <div class="dimension">
      <div class="dim-top">
        <div class="dim-name"><span class="dim-icon">${d.icon}</span>${d.name}</div>
        <div class="dim-score" id="dscore-${d.id}">${dimScore(d.id)}</div>
      </div>
      <div class="dim-desc">${d.desc}</div>
      <div class="questions">
        ${d.questions.map((q,qi) => `
          <div class="q-row">
            <div class="q-label">${q.q}</div>
            <div class="slider-row">
              <input type="range" min="0" max="4" step="1" value="${scores[d.id][qi]}"
                oninput="setScore('${d.id}',${qi},parseInt(this.value))"
                style="flex:1;accent-color:var(--orange)">
              <span class="slider-val" id="sv-${d.id}-${qi}">${scores[d.id][qi]}</span>
            </div>
            <div class="rubric">
              ${q.rubric.map(r=>`<span>${r}</span>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function dimScore(id){
  const s = scores[id];
  return Math.round((s.reduce((a,b)=>a+b,0)/s.length)*25);
}

function setScore(id,qi,val){
  scores[id][qi] = val;
  document.getElementById(`sv-${id}-${qi}`).textContent = val;
  document.getElementById(`dscore-${id}`).textContent = dimScore(id);
}

function totalScore(){
  return Math.round(DIMS.reduce((s,d)=>s+dimScore(d.id),0)/DIMS.length);
}

function getMoat(score){
  if(score>=70) return {label:'Wide moat',cls:'moat-wide'};
  if(score>=45) return {label:'Narrow moat',cls:'moat-narrow'};
  return {label:'No moat',cls:'moat-none'};
}

function getStrengths(){
  const ranked = DIMS.map(d=>({name:d.name,score:dimScore(d.id)})).sort((a,b)=>b.score-a.score);
  const lines = [];
  ranked.forEach(r => {
    if(r.score>=70) lines.push({text:`${r.name} is a genuine source of durable advantage.`,color:'#3fb950'});
    else if(r.score>=45) lines.push({text:`${r.name} provides some protection but needs monitoring.`,color:'var(--orange)'});
    else lines.push({text:`${r.name} offers little defence — exposure to competition.`,color:'#f85149'});
  });
  return lines;
}

function getSummary(){
  return DIMS.map(d=>`${d.name}: ${dimScore(d.id)}/100`).join(', ');
}

function buildVerdict(){
  const name = document.getElementById('companyName').value || 'Unnamed company';
  const total = totalScore();
  const moat = getMoat(total);
  const strengths = getStrengths();
  const now = new Date().toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'});

  const circ = Math.PI * 2 * 44;
  const pct = total/100;
  const scoreColor = total>=70?'#3fb950':total>=45?'var(--orange)':'#f85149';

  const dimBars = DIMS.map(d=>{
    const s = dimScore(d.id);
    return `<div class="dbar-row">
      <div class="dbar-lbl">${d.name.split(' ')[0]}</div>
      <div class="dbar-track"><div class="dbar-fill" style="width:${s}%"></div></div>
      <div class="dbar-val">${s}</div>
    </div>`;
  }).join('');

  const strItems = strengths.map(s=>`
    <div class="str-item">
      <div class="str-bullet" style="background:${s.color}"></div>
      <span>${s.text}</span>
    </div>`).join('');

  document.getElementById('verdictBox').innerHTML = `
    <div class="verdict-top">
      <div>
        <div class="verdict-company">${name}</div>
        <div class="verdict-date">Scored ${now}</div>
      </div>
      <div class="moat-badge ${moat.cls}">${moat.label}</div>
    </div>
    <div class="score-ring-wrap">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle cx="55" cy="55" r="44" stroke="var(--color-border-tertiary)" stroke-width="8" fill="none"/>
          <circle cx="55" cy="55" r="44" stroke="${scoreColor}" stroke-width="8" fill="none"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct)}"
            stroke-linecap="round"/>
        </svg>
        <div class="score-center">
          <div class="score-big" style="color:${scoreColor}">${total}</div>
          <div class="score-max">/ 100</div>
        </div>
      </div>
    </div>
    <div class="dim-bars">${dimBars}</div>
    <div class="strengths">
      <div class="str-title">DIMENSION ANALYSIS</div>
      ${strItems}
    </div>
  `;
}

function switchTab(t){
  if(t==='result') buildVerdict();
  if(t==='saved') renderSaved();
  ['score','result','saved'].forEach(id => {
    document.getElementById('tab-'+id).style.display = id===t?'block':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active',['score','result','saved'][i]===t);
  });
}

function saveCard(){
  const name = document.getElementById('companyName').value || 'Unnamed company';
  const saved = JSON.parse(localStorage.getItem('aa_moat_saved')||'[]');
  const entry = {
    name, total:totalScore(),
    moat:getMoat(totalScore()).label,
    mclass:getMoat(totalScore()).cls,
    dims:DIMS.map(d=>({id:d.id,name:d.name,score:dimScore(d.id)})),
    scores:JSON.parse(JSON.stringify(scores)),
    date: new Date().toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'}),
    id:Date.now()
  };
  saved.unshift(entry);
  localStorage.setItem('aa_moat_saved', JSON.stringify(saved.slice(0,20)));
  alert(`"${name}" saved to your scorecard library.`);
}

function renderSaved(){
  const saved = JSON.parse(localStorage.getItem('aa_moat_saved')||'[]');
  const el = document.getElementById('savedList');
  if(!saved.length){
    el.innerHTML='<div class="empty-state">No saved scorecards yet.<br>Score a company and hit "Save scorecard".</div>';
    return;
  }
  el.innerHTML = saved.map(s=>`
    <div class="saved-card" onclick="loadSaved(${s.id})">
      <div class="sc-top">
        <div class="sc-name">${s.name}</div>
        <span class="sc-badge ${s.mclass}">${s.moat}</span>
      </div>
      <div class="sc-bars">
        ${s.dims.map(d=>`<div class="sc-bar" style="height:${Math.max(4,d.score*0.28)}px" title="${d.name}: ${d.score}"></div>`).join('')}
      </div>
      <div class="sc-meta">${s.date} · Overall ${s.total}/100</div>
    </div>
  `).join('');
}

function loadSaved(id){
  const saved = JSON.parse(localStorage.getItem('aa_moat_saved')||'[]');
  const entry = saved.find(s=>s.id===id);
  if(!entry) return;
  document.getElementById('companyName').value = entry.name;
  Object.assign(scores, entry.scores);
  buildDimensions();
  switchTab('result');
}

function clearSaved(){
  if(confirm('Clear all saved scorecards?')){ localStorage.removeItem('aa_moat_saved'); renderSaved(); }
}

buildDimensions();
</script>
